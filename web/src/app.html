<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-16x16.png" sizes="16x16" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-32x32.png" sizes="32x32" />
		<link
			rel="android-chrome"
			href="%sveltekit.assets%/android-chrome-192x192.png"
			sizes="192x192"
		/>
		<link
			rel="android-chrome"
			href="%sveltekit.assets%/android-chrome-512x512.png"
			sizes="512x512"
		/>
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/apple-touch-icon.png"
			content="pookit"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
